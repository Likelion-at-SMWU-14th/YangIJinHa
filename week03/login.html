<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Log In Page</title>
    </head>
    <body>
        <div>
            <header>
                <img src="./images/likelion_logo.svg" />
                <p>숙명여대 LIKELION 14TH에 오신 <br>여러분을 환영합니다!</p>
            </header>

            <form>
                <input type="text" name="username" placeholder="아이디" autocomplete="off" />
                <input type="password" name="password" placeholder="비밀번호" autocomplete="new-password" />
                <button type="submit">로그인하기</button>
            </form>
            <aside>
                <p>아직 계정이 없으신가요?</p>
                <a href="./signup.html" title="회원가입">회원가입하기</a>
            </aside>
        </div>
    </body>
</html>
