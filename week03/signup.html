<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>🦁 회원가입</title>
    </head>
    <body>
        <div>
            <header>
                <div>
                    <img src="./images/likelion_logo.svg" alt="멋사 로고">
                    <h2>회원가입하기</h2>
                </div>
                <a href="./login.html"><img src="./images/out.svg" alt="나가기 버튼"></a>
            </header>
            <form name="signup" method="post">
                <section>
                    <span>이름</span>
                    <input name="first_name" type="text" placeholder="김사자" required autocomplete="off" />
                </section>
                <section>
                    <span>아이디</span>
                    <input name="username" type="text" placeholder="아이디를 입력해 주세요." required autocomplete="off" />
                </section>
                <section>
                    <span>비밀번호</span>
                    <input name="password1" type="password" placeholder="비밀번호를 입력해 주세요." required autocomplete="new-password" />
                </section>
                <section>
                    <span>비밀번호 확인</span>
                    <input name="password2" type="password" placeholder="비밀번호를 다시 입력해주세요." required autocomplete="new-password" />
                </section>
                <button type="submit">회원가입하기</button>
            </form>
        </div>
    </body>
</html>
